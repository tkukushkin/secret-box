name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Build (arm64)
        run: swift build -c release --arch arm64

      - name: Build (x86_64)
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/secret-box \
            .build/x86_64-apple-macosx/release/secret-box \
            -output secret-box
          chmod +x secret-box

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" secret-box --generate-notes
