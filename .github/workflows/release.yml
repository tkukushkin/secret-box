name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build (arm64)
        env:
          GOARCH: arm64
          CGO_ENABLED: "1"
        run: go build -ldflags "-X main.version=${{ github.event.release.tag_name }}" -o secret-box-arm64

      - name: Build (amd64)
        env:
          GOARCH: amd64
          CGO_ENABLED: "1"
        run: go build -ldflags "-X main.version=${{ github.event.release.tag_name }}" -o secret-box-amd64

      - name: Create universal binary
        run: |
          lipo -create secret-box-arm64 secret-box-amd64 -output secret-box
          chmod +x secret-box

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" secret-box
